name: Build TOTP Image

on:
  push:
    branches:
      - feature/totp-pr1620
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-totp-image-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDER_IMAGE: ghcr.io/sebadob/rauthy-builder:20260519@sha256:6bea5d732ebfa4613c51a55c1c9c8b5c59dddfde9adbb6eca899d6599fd2b219
  IMAGE_NAME: ghcr.io/mrchypark/rauthy-totp

jobs:
  build:
    name: Build and publish multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prebuild UI and compile release binaries
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p out/empty "${RUNNER_TEMP}/build-home" "${RUNNER_TEMP}/cargo-registry"

          docker run --rm \
            --volume "${RUNNER_TEMP}/build-home:/tmp/build-home" \
            --volume "${RUNNER_TEMP}/cargo-registry:/usr/local/cargo/registry" \
            --volume "${GITHUB_WORKSPACE}:/work" \
            --workdir /work \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/build-home \
            "${BUILDER_IMAGE}" \
            bash -euxo pipefail -c '
              just build-wasm
              cd frontend
              npm install
              cd ..
              just build-ui
              cargo build --release --target x86_64-unknown-linux-gnu
            '
          cp target/x86_64-unknown-linux-gnu/release/rauthy out/rauthy_amd64

          docker run --rm \
            --volume "${RUNNER_TEMP}/build-home:/tmp/build-home" \
            --volume "${RUNNER_TEMP}/cargo-registry:/usr/local/cargo/registry" \
            --volume "${GITHUB_WORKSPACE}:/work" \
            --workdir /work \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/build-home \
            --env JEMALLOC_SYS_WITH_LG_PAGE=16 \
            "${BUILDER_IMAGE}" \
            cargo build --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/rauthy out/rauthy_arm64

      - name: Prepare image metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          {
            echo "short_sha=${short_sha}"
            echo "created=$(date --utc +'%Y-%m-%dT%H:%M:%SZ')"
            echo "version=0.36.0-totp-pr1620-${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:totp-pr1620
            ${{ env.IMAGE_NAME }}:totp-pr1620-${{ steps.metadata.outputs.short_sha }}
          build-args: |
            CREATED=${{ steps.metadata.outputs.created }}
            VERSION=${{ steps.metadata.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/mrchypark/rauthy
